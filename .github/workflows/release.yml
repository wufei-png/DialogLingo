name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Validate tag matches package version
        run: |
          node -e 'const fs = require("node:fs"); const version = JSON.parse(fs.readFileSync("package.json", "utf8")).version; const expected = "v" + version; const actual = process.env.GITHUB_REF_NAME; if (actual !== expected) { console.error("Release tag " + actual + " does not match package version " + expected + "."); process.exit(1); } console.log("Release tag " + actual + " matches package version " + version + ".");'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  package:
    name: Package ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    env:
      HAS_MAC_SIGNING: ${{ secrets.MAC_CSC_LINK != '' && secrets.MAC_CSC_KEY_PASSWORD != '' }}
      HAS_WIN_SIGNING: ${{ secrets.WIN_CSC_LINK != '' && secrets.WIN_CSC_KEY_PASSWORD != '' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            platform: mac
            args: --mac dmg zip --arm64
          - name: macOS x64
            os: macos-15-intel
            platform: mac
            args: --mac dmg zip --x64
          - name: Windows x64
            os: windows-2025
            platform: win
            args: --win nsis --x64
          - name: Ubuntu x64
            os: ubuntu-24.04
            platform: linux
            args: --linux AppImage deb --x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Verify package inputs
        run: npm run verify:package-inputs

      - name: Build and publish unsigned draft release assets
        if: ${{ matrix.platform == 'linux' || (matrix.platform == 'mac' && env.HAS_MAC_SIGNING != 'true') || (matrix.platform == 'win' && env.HAS_WIN_SIGNING != 'true') }}
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build and publish signed macOS draft release assets
        if: ${{ matrix.platform == 'mac' && env.HAS_MAC_SIGNING == 'true' }}
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build and publish signed Windows draft release assets
        if: ${{ matrix.platform == 'win' && env.HAS_WIN_SIGNING == 'true' }}
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
